# Renders accurate GitHub stats into SVGs committed to this repo, so the
# profile never depends on rate-limited public widget hosts.
#   - stats: lowlighter/metrics (private + org contributions via METRICS_TOKEN)
#   - languages: scripts/gen-langs.mjs — aggregates GitHub's per-repo language
#     bytes across owned + org repos, skipping vendored-deps repos (>20MB),
#     because metrics' indepth mode silently failed to analyze the private
#     org repo.
name: Profile metrics
on:
  schedule:
    - cron: "0 2 * * *"   # daily, 07:30 IST
  workflow_dispatch:
permissions:
  contents: write
jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: k-rajpurohit
          repositories_affiliations: owner, collaborator, organization_member
          filename: github-metrics.svg
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
  languages:
    needs: stats   # serialize so the two SVG commits never race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Generate language card
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: node scripts/gen-langs.mjs
      - name: Commit updated card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-langs.svg
          if git diff --cached --quiet; then echo "No changes"; exit 0; fi
          git commit -m "Update github-langs.svg"
          git pull --rebase origin main
          git push origin HEAD:main
