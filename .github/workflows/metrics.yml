# Renders accurate GitHub stats (private + org repos included, via
# METRICS_TOKEN) into SVGs committed to this repo. The README embeds them, so
# the profile never depends on rate-limited public widget hosts again.
name: Profile metrics
on:
  schedule:
    - cron: "0 2 * * *"   # daily, 07:30 IST
  workflow_dispatch:
permissions:
  contents: write
jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: k-rajpurohit
          repositories_affiliations: owner, collaborator, organization_member
          filename: github-metrics.svg
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
  languages:
    needs: stats   # serialize so the two SVG commits never race
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: k-rajpurohit
          repositories_affiliations: owner, collaborator, organization_member
          filename: github-langs.svg
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_indepth_custom: Automation-Owl-projects/SAAS-Social-Media
          repositories: 200
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_categories: programming
          plugin_languages_analysis_timeout: 15
          commits_authoring: k-rajpurohit, krishnarajpurohit2014@gmail.com, BFMNINJA
